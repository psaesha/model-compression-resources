name: Update paper list

on:
  push:
    paths:
      - papers.txt    # new URL added
      - manual.bib    # new manual BibTeX entry added

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.3"

      - run: python build.py

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md papers.bib .cache.txt
          git diff --cached --quiet || git commit -m "chore: regenerate README and bib [skip ci]"
          git push